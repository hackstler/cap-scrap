<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 340px; padding: 16px; font-family: system-ui, sans-serif; font-size: 14px; }
    h2 { margin: 0 0 12px; font-size: 16px; }
    label { display: block; margin-bottom: 4px; font-weight: 500; }
    input { width: 100%; padding: 6px 8px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
    #startBtn { background: #28a745; color: white; }
    #startBtn:hover { background: #218838; }
    #startBtn:disabled { background: #999; cursor: not-allowed; }
    #stopBtn { background: #dc3545; color: white; margin-top: 8px; display: none; }
    #stopBtn:hover { background: #c82333; }
    #status { margin-top: 12px; padding: 8px; background: #f8f9fa; border-radius: 4px; font-size: 13px; display: none; }
    .progress { color: #666; }
  </style>
</head>
<body>
  <h2>Cap Valoraciones</h2>

  <label>Sheet ID</label>
  <input type="text" id="sheetId" placeholder="1BxiMVs0XRA5nFMdKvBd...">

  <label>Nombre de la pestaña</label>
  <input type="text" id="tabName" placeholder="ORIGINAL">

  <div style="display:flex;gap:12px;">
    <div style="flex:1;">
      <label>Col. ref. catastral</label>
      <input type="text" id="colRefCatastral" placeholder="G" maxlength="2" style="text-transform:uppercase;">
    </div>
    <div style="flex:1;">
      <label>Col. inicio resultados</label>
      <input type="text" id="colResultStart" placeholder="K" maxlength="2" style="text-transform:uppercase;">
    </div>
  </div>

  <label>Email (para Idealista)</label>
  <input type="email" id="email" placeholder="tu@email.com">

  <label>Espera entre propiedades (minutos)</label>
  <input type="number" id="delayMinutes" value="3" min="1" max="60" step="1" pattern="[0-9]*">


  <button id="startBtn">Empezar</button>
  <button id="stopBtn">Parar</button>

  <div id="status"></div>

  <button id="testTokenBtn" style="background:#007bff;color:white;margin-top:8px;">Test Token Refresh</button>
  <button id="logsBtn" style="background:#6c757d;color:white;margin-top:8px;">Descargar logs</button>

  <script src="popup.js"></script>
</body>
</html>
